name       : ghostwriter
version    : 24.01.95
release    : 31
source     :
    - https://cdn.download.kde.org/unstable/release-service/24.01.95/src/ghostwriter-24.01.95.tar.xz : a04d8ec4a9e1f914d7d08a0d4a06fdddaf0c772f9e6537e9d09f7dc76b2428c8
license    :
    - CC-BY-SA-4.0
    - GPL-3.0-or-later
component  : editor
homepage   : https://wereturtle.github.io/ghostwriter/
summary    : Cross-platform, aesthetic, distraction-free Markdown editor.
description: |
    ghostwriter is a Windows and Linux text editor for Markdown, ghostwriter provides a relaxing, distraction-free writing environment, whether your masterpiece be that next blog post, your school paper, or your NaNoWriMo novel.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6UiTools)
    - pkgconfig(hunspell)
    - pkgconfig(librsvg-2.0)
    - extra-cmake-modules
    - kf6-kcoreaddons-devel
    - kconfigwidgets-devel
    - kf6-kxmlgui-devel
    - kf6-sonnet-devel
    - qt6-webengine-devel
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
