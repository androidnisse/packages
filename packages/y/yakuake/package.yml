name       : yakuake
version    : 24.01.95
release    : 58
source     :
    - https://cdn.download.kde.org/unstable/release-service/24.01.95/src/yakuake-24.01.95.tar.xz : d986488b1a1bb4ecb2655c2196f9053b78b72bcb8d2afbeecf7b8068c7a6e919
homepage   : https://kde.org/applications/system/org.kde.yakuake
license    : GPL-2.0
component  : desktop.kde
summary    : A quake style dropdown terminal.
description: |
    A quake-inspired dropdown terminal window.  Qt-based, robust, and highly configurable.
builddeps  :
    - pkgconfig(Qt6Svg)
    - pkgconfig(Qt6Widgets)
    - pkgconfig(x11)
    - kf5-kwayland-devel
    - kf6-karchive-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kglobalaccel-devel
    - kf6-kiconthemes-devel
    - kf6-knewstuff-devel
    - kf6-knotifications-devel
    - kf6-knotifyconfig-devel
    - kf6-kparts-devel
    - kf6-kstatusnotifieritem-devel
rundeps    :
    - konsole
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
