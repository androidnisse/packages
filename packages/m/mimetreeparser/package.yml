name       : mimetreeparser
version    : 24.01.95
release    : 1
source     :
    - https://download.kde.org/unstable/release-service/24.01.95/src/mimetreeparser-24.01.95.tar.xz : 50876b969dd79e0df7a0caa41bd8caf6d145709403e37d99b365350add2b33cc
homepage   : https://invent.kde.org/pim/mimetreeparser
license    :
    - BSD-2-Clause
    - BSD-3-Clause
    - CC0-1.0
    - FSFULLR
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : Parser for MIME trees
description: |
    A parser for a MIME tree and is based on KMime. The goal is given a MIME tree to extract a list of parts (e.g. text, html) and a list of attachments, check the validity of the signatures and decrypt any encrypted part.
builddeps  :
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Qml)
    - extra-cmake-modules
    - kf6-kcalendarcore-devel
    - kf6-ki18n-devel
    - kf6-kcodecs-devel
    - kf6-kwidgetsaddons-devel
    - kmime-devel
    - kmbox-devel
    - libkleo-devel
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
