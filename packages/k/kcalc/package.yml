name       : kcalc
version    : 24.01.95
release    : 68
source     :
    - https://cdn.download.kde.org/unstable/release-service/24.01.95/src/kcalc-24.01.95.tar.xz : 5d3fea04a53fc5fb1ca8d0ca70953bc463bd0ec4ef8e02055a988911f60f2ad9
homepage   : https://kde.org/applications/utilities/org.kde.kcalc
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Scientific calculator by KDE
description: |
    KCalc is a calculator which offers many more mathematical functions than meet the eye on a first glance.
optimize   : lto
libsplit   : no
builddeps  :
    - pkgconfig(gmp)
    - pkgconfig(Qt6Core5Compat)
    - kf6-kcrash-devel
    - kf6-kdoctools-devel
    - kf6-kguiaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
    - kf6-kxmlgui-devel
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    # remove docs
    rm -rf $installdir/usr/share/doc
