name       : kdiagram
version    : 3.0.1
release    : 4
source     :
    - https://download.kde.org/stable/kdiagram/3.0.1/kdiagram-3.0.1.tar.xz : 4659b0c2cd9db18143f5abd9c806091c3aab6abc1a956bbf82815ab3d3189c6d
homepage   : https://invent.kde.org/graphics/kdiagram
license    : GPL-2.0-or-later
component  : desktop.library
summary    : Powerful libraries (KChart, KGantt) for creating business diagrams.
description: |
    Powerful libraries (KChart, KGantt) for creating business diagrams.
builddeps  :
    - pkgconfig(Qt5Designer)
    - pkgconfig(Qt5Svg)
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Svg)
    - pkgconfig(glu)
    - extra-cmake-modules
setup      : |
    mkdir qt5 qt6
    pushd qt5
    %cmake_ninja -DBUILD_QCH=ON ..
    popd

    pushd qt6
    %cmake_kf6 -DBUILD_WITH_QT6=ON ..
    popd
build      : |
    pushd qt5
    %ninja_build
    popd

    pushd qt6
    %ninja_build
    popd
install    : |
    pushd qt5
    %ninja_install
    popd

    pushd qt6
    %ninja_install
    popd
