name       : kde-cli-tools
version    : 5.93.0
release    : 91
source     :
    - https://download.kde.org/unstable/plasma/5.93.0/kde-cli-tools-5.93.0.tar.xz : 8c72d7463357ff933953782e563409c7c3ff6e622fb4cf14fe0402b95fc57969
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-only
component  : desktop.kde.core
summary    : Tools to better interact with the system
description: |
    Tools based on KDE Frameworks 6 to better interact with the system.
builddeps  :
    - pkgconfig(Qt6Svg)
    - kf6-kconfig-devel
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-ki18n-devel
    - kf6-kcmutils-devel
    - kf6-kio-devel
    - kf6-kservice-devel
    - kf6-kwindowsystem-devel
    - kf6-kparts-devel
    - kf6-kcoreaddons-devel
    - kf6-kdesu-devel
clang      : yes
optimize   : lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -rf $installdir/usr/share/doc
# patterns   :
#     - /usr/lib64/libkdeinit5*
