name       : kbackup
version    : 24.01.95
release    : 24
source     :
    - https://cdn.download.kde.org/unstable/release-service/24.01.95/src/kbackup-24.01.95.tar.xz : c175cfcdec53a143536c2a3ca920520728fbdf454348a1ae3ef3b03f1fd4e499
homepage   : https://apps.kde.org/en/kbackup
license    : GPL-2.0-or-later
component  : network.util
summary    : KBackup is an application which lets you back up your data in a simple, user friendly way
description: |
    KBackup is an application which lets you back up your data in a simple, user friendly way
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(libarchive)
    - kf6-karchive-devel
    - kf6-kdoctools-devel
    - kf6-kio-devel
    - kf6-kiconthemes-devel
    - kf6-kguiaddons-devel
    - kf6-knotifications-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-kxmlgui-devel
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install

    #remove docs
    rm -rf $installdir/usr/share/doc
