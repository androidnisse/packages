name       : krdc
version    : 24.01.95
release    : 56
source     :
    - https://cdn.download.kde.org/unstable/release-service/24.01.95/src/krdc-24.01.95.tar.xz : c64ae9cddd59542596baadc0de61c337118c94a4b738b64b98f3b2f3672bd840
homepage   : https://kde.org/applications/internet/org.kde.krdc
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : network.util
summary    : KDE's remote desktop client
description: |
    KRDC is a client application that allows you to view or even control the desktop session on another machine that is running a compatible server. VNC and RDP are supported.
builddeps  :
    - pkgconfig(freerdp2)
    - pkgconfig(libssh)
    - pkgconfig(libvncserver)
    - kf6-kbookmarks-devel
    - kf6-kcmutils-devel
    - kf6-kcompletion-devel
    - kf6-kdnssd-devel
    - kf6-ki18n-devel
    - kf6-kio-devel
    - kf6-kiconthemes-devel
    - kf6-knotifications-devel
    - kf6-knotifyconfig-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-kwallet-devel
    - kf6-kwindowsystem-devel
    - kf6-kxmlgui-devel
rundeps    :
    - freerdp
setup      : |
    %cmake_kf6 -DBUILD_WITH_QT6=ON
build      : |
    %ninja_build
install    : |
    %ninja_install

    # Fix appstream processing
    install -Dm00644 $workdir/logo.png $installdir/usr/share/pixmaps/krdc.png
