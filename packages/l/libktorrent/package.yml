name       : libktorrent
version    : 24.01.95
release    : 36
source     :
    - https://cdn.download.kde.org/unstable/release-service/24.01.95/src/libktorrent-24.01.95.tar.xz : b8fbc7b9ccc17858a9110c3b77d84538f26619678342e0d489d49c7ec5e9dd98
homepage   : https://invent.kde.org/network/libktorrent
license    : GPL-2.0-or-later
component  : programming.library
summary    : BitTorrent protocol implementation
description: |
    libkTorrent is a BitTorrent protocol implementation for KDE.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(libgcrypt)
    - kf6-karchive-devel
    - kf6-kcrash-devel
    - kf6-kio-devel
    - libboost-devel
    - qca-qt6-devel
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
