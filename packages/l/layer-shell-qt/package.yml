name       : layer-shell-qt
version    : 5.93.0
release    : 27
source     :
    - https://download.kde.org/unstable/plasma/5.93.0/layer-shell-qt-5.93.0.tar.xz : 1b249f23af19a6c270a6bb6303457076166538e0f18c176f7a08c33b59249a40
homepage   : https://kde.org/plasma-desktop/
license    :
    - BSD-3-Clause
