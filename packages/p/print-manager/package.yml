name       : print-manager
version    : 5.93.0
release    : 77
source     :
    - https://download.kde.org/unstable/plasma/5.93.0/print-manager-5.93.0.tar.xz : 77547a05687612397a20488e443d237cccdd3dc9bad56e82dca8be19763d2299
homepage   : https://kde.org/
license    : GPL-2.0-or-later
component  : desktop.kde.core
summary    : Tool for managing print jobs and printers
description: |
    Tool for managing print jobs and printers on the KDE Plasma desktop.
optimize   : lto
libsplit   : no
builddeps  :
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6Core5Compat)
    - cups-devel
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-kiconthemes-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-knotifications-devel
    - kf6-kpackage-devel
    - kirigami-addons-devel
    - libplasma-devel
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %qml6_cache
