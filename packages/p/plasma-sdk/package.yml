name       : plasma-sdk
version    : 5.93.0
release    : 75
source     :
    - https://download.kde.org/unstable/plasma/5.93.0/plasma-sdk-5.93.0.tar.xz : ec2e4f4e390780cdd8161f7876f50311866328ce18e433c278f599058ce56db0
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - GPL-2.0
    - LGPL-2.1
component  : desktop.kde
summary    : Applications useful for Plasma Development
description: |
    Applications useful for Plasma Development.
builddeps  :
    - pkgconfig(Qt6Core5Compat)
    - pkgconfig(Qt6Svg)
    - kf6-karchive-devel
    - kf6-kdbusaddons-devel
    - kf6-kdeclarative-devel
    - kf6-kdoctools-devel
    - kf6-kiconthemes-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-kitemmodels-devel
    - kf6-kpackage-devel
    - kf6-kparts-devel
    - kf6-ksvg-devel
    - kf6-ktexteditor-devel
    - kf6-kxmlgui-devel
    - kf6-syntax-highlighting-devel
    - libplasma-devel
    - plasma5support-devel
setup      : |
    rm -fr $workdir/po/nl/docs/plasma-sdk
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %qml6_cache
