name       : plasma-nm
version    : 5.93.0
release    : 95
source     :
    - https://download.kde.org/unstable/plasma/5.93.0/plasma-nm-5.93.0.tar.xz : f81bd0318f688cda3767206beeb814151e18d846cfea844fba70f0e7634fafe5
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - GPL-2.0-only
    - LGPL-2.1-only
component  : desktop.kde.core
summary    : Plasma applet for managing network connections
description: |
    Plasma applet written in QML for managing network connections.
libsplit   : no
optimize   : lto
builddeps  :
    - pkgconfig(libnm)
    - pkgconfig(ModemManager)
    - pkgconfig(openconnect)
    - pkgconfig(Qt6WebEngineWidgets)
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-kdeclarative-devel
    - kf6-kio-devel
    - kf6-knotifications-devel
    - kf6-kpackage-devel
    - kf6-ksvg-devel
    - kf6-kwallet-devel
    - kf6-modemmanager-qt-devel
    - kf6-networkmanager-qt-devel
    - kf6-prison-devel
    - libplasma-devel
    - mobile-broadband-provider-info-devel
    - qca-qt6-devel
    - qcoro-qt6-devel
rundeps    :
    - prison
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %qml6_cache
