name       : pim-data-exporter
version    : 24.01.95
release    : 66
source     :
    - https://cdn.download.kde.org/unstable/release-service/24.01.95/src/pim-data-exporter-24.01.95.tar.xz : 39f3cd6693085973b99198f2cffff5568a8a3ef9a21a95b2725087190321f7de
homepage   : https://kde.org/
license    :
    - GFDL-1.2-or-later
    - GPL-2.0-or-later
component  : office
summary    : Application to archive PIM data
description: |
    Application to assist you with backing up and archiving PIM data, including the necessary configuration, for archival or transfer to another computer.
builddeps  :
    - pkgconfig(Qt6WebEngineWidgets)
    - akonadi-notes-devel
    - kf6-kcalendarcore-devel
    - kf6-karchive-devel
    - kf6-kcontacts-devel
    - kf6-kcrash-devel
    - kf6-kdbusaddons-devel
    - kf6-kdoctools-devel
    - kidentitymanagement-devel
    - kf6-kio-devel
    - kmailtransport-devel
    - kf6-knotifications-devel
    - kf6-kstatusnotifieritem-devel
    - kf6-kuserfeedback-devel
    - kf6-kxmlgui-devel
    - ktextaddons-devel
    - mailcommon-devel
    - pimcommon-devel
setup      : |
    %cmake_kf6 -DBUILD_TESTING=OFF
build      : |
    %ninja_build
install    : |-
    %ninja_install

    # remove doc
    rm -rf $installdir/usr/share/doc
